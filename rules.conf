# Format: package,ip:port[:proto]
# 格式：package,ip:port[:proto]
#
# Proto: tcp (default), udp, or both
# 协议：tcp（默认）、udp 或 both（两者）
#
# IP: single IP or CIDR range (e.g., 127.0.0.0/8)
# IP：单个 IP 或 CIDR 范围（如 127.0.0.0/8）
#
# [whitelist] section: listed apps ALLOWED, others BLOCKED for same endpoint
# [whitelist] 部分：列出的应用允许访问，相同端点的其他应用被阻止
#
# [blacklist] section: listed apps BLOCKED, others ALLOWED for same endpoint
# [blacklist] 部分：列出的应用被阻止，相同端点的其他应用允许访问
#
# Examples（示例）：
# com.example.app,127.0.0.1:8765           (TCP only, default)
# com.example.app,127.0.0.1:8765          （仅 TCP，默认）
# com.example.app,127.0.0.1:8765:udp       (UDP only)
# com.example.app,127.0.0.1:8765:udp      （仅 UDP）
# com.example.app,127.0.0.1:8765:both      (TCP and UDP)
# com.example.app,127.0.0.1:8765:both     （TCP 和 UDP）
# com.example.app,127.0.0.0/8:8765:both    (CIDR range, both protocols)
# com.example.app,127.0.0.0/8:8765:both   （CIDR 范围，两种协议）

[whitelist]
com.omarea.vtools,127.0.0.1:8765

[blacklist]
